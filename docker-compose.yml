services:

  # ── Go: ファイルAPIサーバー ──────────────────────────────────
  fileserver:
    build: ./fileserver
    container_name: fileserver
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - ADMIN_PASSWORD=admin1234   # ← ここを変更してください
    volumes:
      - uploads:/app/uploads
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/files"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js: Webダッシュボード ───────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - GO_API_URL=http://fileserver:8080
    networks:
      - app-net
    depends_on:
      fileserver:
        condition: service_healthy
    restart: unless-stopped

  # ── Python: ファイル処理ワーカー ─────────────────────────────
  worker:
    build: ./worker
    container_name: worker
    environment:
      - GO_API_URL=http://fileserver:8080
      - POLL_INTERVAL=10
    networks:
      - app-net
    depends_on:
      fileserver:
        condition: service_healthy
    restart: unless-stopped

# ── 共有ボリューム ────────────────────────────────────────────
volumes:
  uploads:

# ── 内部ネットワーク ─────────────────────────────────────────
networks:
  app-net:
    driver: bridge
